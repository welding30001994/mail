<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
  <title>Fondeo 2.2 · Futurista</title>
  <!-- Google Font para un toque tecnológico -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome para iconos (opcional pero da carácter) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 20% 30%, #0b0d1a, #03050b);
      font-family: 'Space Grotesk', sans-serif;
      padding: 1.5rem;
    }

    /* contenedor principal con efecto neón / vidrio futurista */
    .form-wrapper {
      max-width: 640px;
      width: 100%;
      background: rgba(12, 20, 35, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 255, 255, 0.25);
      border-radius: 3.5rem 1.5rem 3.5rem 1.5rem;
      padding: 2.8rem 2.2rem;
      box-shadow: 0 20px 50px rgba(0, 180, 255, 0.15), inset 0 0 0 1px rgba(0, 255, 255, 0.08);
      transition: box-shadow 0.3s ease, transform 0.2s ease;
    }

    .form-wrapper:hover {
      box-shadow: 0 30px 70px rgba(0, 200, 255, 0.25), inset 0 0 0 1px rgba(0, 255, 255, 0.3);
      transform: scale(1.01);
    }

    /* encabezado con nombre futurista */
    .brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid rgba(0, 255, 255, 0.2);
      padding-bottom: 1rem;
    }

    .brand i {
      font-size: 2.4rem;
      color: #00e0ff;
      text-shadow: 0 0 15px #00a6ff, 0 0 30px #0077ff55;
    }

    .brand h1 {
      font-weight: 600;
      font-size: 2rem;
      letter-spacing: 0.1em;
      background: linear-gradient(135deg, #b3f0ff, #5ac8ff, #00d4ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px #0088ff55;
      margin: 0;
      line-height: 1.2;
    }

    .brand small {
      font-size: 0.75rem;
      font-weight: 400;
      color: #7fc9ff;
      letter-spacing: 0.3em;
      background: rgba(0, 200, 255, 0.08);
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      border: 1px solid rgba(0, 200, 255, 0.2);
      margin-left: auto;
      text-transform: uppercase;
    }

    /* etiquetas y campos */
    .field-group {
      margin-bottom: 2rem;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      font-weight: 500;
      color: #b0e4ff;
      letter-spacing: 0.02em;
      font-size: 0.95rem;
      text-transform: uppercase;
      position: relative;
    }

    label i {
      margin-right: 0.5rem;
      color: #00ccff;
      width: 1.4rem;
      text-align: center;
    }

    input, textarea {
      width: 100%;
      padding: 0.9rem 1.2rem;
      background: rgba(2, 12, 30, 0.7);
      border: 1.5px solid rgba(0, 200, 255, 0.25);
      border-radius: 1.8rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      color: #e8f5ff;
      transition: all 0.25s ease;
      backdrop-filter: blur(4px);
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.6);
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: #00e5ff;
      box-shadow: 0 0 0 4px rgba(0, 200, 255, 0.2), inset 0 2px 8px #00000088;
      background: rgba(6, 20, 45, 0.8);
    }

    input::placeholder, textarea::placeholder {
      color: #6a8fb1;
      font-weight: 300;
      opacity: 0.7;
      letter-spacing: 0.02em;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
      border-radius: 2rem;
    }

    /* campo de mensaje con un toque especial */
    .message-area label i {
      align-self: flex-start;
      margin-top: 0.8rem;
    }

    /* botón enviar – futurista con brillo */
    .submit-btn {
      width: 100%;
      padding: 1rem 1.5rem;
      margin-top: 0.8rem;
      background: linear-gradient(145deg, #002b4b, #001a30);
      border: 1.5px solid #00d0ff;
      border-radius: 3rem;
      color: #e2f5ff;
      font-weight: 600;
      font-size: 1.25rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 0 15px rgba(0, 180, 255, 0.2), inset 0 0 8px rgba(0, 200, 255, 0.3);
      font-family: 'Space Grotesk', sans-serif;
    }

    .submit-btn i {
      font-size: 1.3rem;
      color: #00dcff;
      transition: transform 0.2s ease;
    }

    .submit-btn:hover {
      background: linear-gradient(145deg, #003f66, #00243f);
      border-color: #4adcff;
      box-shadow: 0 0 35px #00a6ff66, inset 0 0 20px #00b3ff55;
      transform: scale(1.02);
      color: white;
    }

    .submit-btn:hover i {
      transform: translateX(5px);
      color: #7ae4ff;
    }

    .submit-btn:active {
      transform: scale(0.97);
      box-shadow: 0 0 20px #00a6ffaa;
    }

    /* footer / mensaje de cortesía */
    .form-footer {
      margin-top: 2rem;
      display: flex;
      justify-content: flex-end;
      font-size: 0.7rem;
      color: #4b789b;
      letter-spacing: 0.1em;
      border-top: 1px solid rgba(0, 200, 255, 0.1);
      padding-top: 1rem;
    }

    .form-footer i {
      color: #00bbff;
      margin-right: 0.4rem;
    }

    /* responsive: ajustes en móviles */
    @media (max-width: 600px) {
      .form-wrapper {
        padding: 1.8rem 1.2rem;
        border-radius: 2.5rem 1rem 2.5rem 1rem;
      }
      .brand {
        flex-wrap: wrap;
        gap: 0.2rem;
      }
      .brand h1 {
        font-size: 1.7rem;
        letter-spacing: 0.05em;
      }
      .brand small {
        font-size: 0.6rem;
        padding: 0.2rem 0.6rem;
        margin-left: 0;
      }
      .brand i {
        font-size: 2rem;
      }
      input, textarea {
        padding: 0.7rem 1rem;
        font-size: 0.95rem;
      }
      .submit-btn {
        font-size: 1rem;
        padding: 0.8rem 1.2rem;
      }
    }

    @media (max-width: 400px) {
      .brand h1 {
        font-size: 1.3rem;
      }
      .form-wrapper {
        padding: 1.5rem 0.9rem;
      }
    }

    /* Efecto sutil de partículas (solo decorativo) */
    .form-wrapper::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: radial-gradient(circle at 30% 40%, rgba(0, 200, 255, 0.03), transparent 70%);
      z-index: -1;
      border-radius: inherit;
      pointer-events: none;
    }

    .form-wrapper {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="form-wrapper">
    <!-- cabecera futurista con el nombre "Fondeo 2.2" y toque de empresa -->
    <div class="brand">
      <i class="fas fa-rocket"></i>
      <h1>Fondeo 2.2</h1>
      <small>NEXUS</small>
    </div>

    <!-- FORMULARIO: acción a Formspree, método POST -->
    <form action="https://formspree.io/f/mbdnokda" method="POST">
      <!-- campo email -->
      <div class="field-group">
        <label for="email">
          <span><i class="fas fa-envelope"></i> Correo electrónico</span>
          <input type="email" id="email" name="email" placeholder="tu@dominio.future" required>
        </label>
      </div>

      <!-- campo mensaje -->
      <div class="field-group message-area">
        <label for="message">
          <span><i class="fas fa-comment-dots"></i> Mensaje</span>
          <textarea id="message" name="message" placeholder="Escribe tu mensaje...  (mínimo 10 caracteres)" required></textarea>
        </label>
      </div>

      <!-- otros campos ocultos o adicionales (se puede extender) -->
      <!-- <input type="hidden" name="_subject" value="Nuevo mensaje desde Fondeo 2.2"> -->

      <!-- botón enviar con icono futurista -->
      <button type="submit" class="submit-btn">
        <span>Enviar</span>
        <i class="fas fa-paper-plane"></i>
      </button>

      <div class="form-footer">
        <i class="fas fa-lock"></i> 
        <span>· conexión segura ·</span>
        <span style="margin-left: 0.8rem;"><i class="fas fa-satellite-dish"></i> 2.2</span>
      </div>
    </form>
  </div>
</body>
</html>
